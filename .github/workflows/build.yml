name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      snapcast_version:
        description: 'Snapcast version to build'
        required: false
        default: '0.35.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download go-librespot
        run: |
          wget -q https://github.com/devgianlu/go-librespot/releases/latest/download/go-librespot_linux_x86_64.tar.gz
          tar -xzf go-librespot_linux_x86_64.tar.gz
          ls -la
          mv go-librespot_linux_x86_64/go-librespot ./go-librespot || mv go-librespot ./go-librespot
          chmod +x go-librespot
          echo "Binary ready"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            SNAPCAST_VERSION=${{ github.event.inputs.snapcast_version || '0.35.0' }}
          tags: |
            ghcr.io/shiftyotter1001/snapcast-docker:latest
            ghcr.io/shiftyotter1001/snapcast-docker:${{ github.event.inputs.snapcast_version || '0.35.0' }}
