name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      snapcast_version:
        description: 'Snapcast version to build'
        required: false
        default: '0.35.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            SNAPCAST_VERSION=${{ github.event.inputs.snapcast_version || '0.35.0' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.snapcast_version || '0.35.0' }}
