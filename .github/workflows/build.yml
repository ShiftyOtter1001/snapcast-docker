name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      snapcast_version:
        description: 'Snapcast version to build'
        required: false
        default: '0.34.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download go-librespot
        run: |
          # Get the download URL for the latest linux amd64 release
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/devgianlu/go-librespot/releases/latest \
            | grep "browser_download_url" \
            | grep "linux_amd64" \
            | cut -d '"' -f 4)
          echo "Found URL: $DOWNLOAD_URL"
          
          # Download and extract
          wget -q "$DOWNLOAD_URL" -O go-librespot.tar.gz
          tar -xzf go-librespot.tar.gz
          
          # Show what was extracted so we can see the structure
          ls -la
          
          # Copy whichever file is the binary (not the .tar.gz)
          find . -maxdepth 2 -type f -name 'go-librespot' -exec cp {} ./go-librespot-final \;
          mv go-librespot-final go-librespot
          chmod +x go-librespot
          echo "go-librespot ready: $(./go-librespot --version 2>&1 || echo 'binary present')"

      - name: Build and push
        uses: docker/build-push-action@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          context: .
          push: true
          build-args: |
            SNAPCAST_VERSION=${{ github.event.inputs.snapcast_version || '0.34.0' }}
          tags: |
            ghcr.io/shiftyotter1001/snapcast-docker:latest
            ghcr.io/shiftyotter1001/snapcast-docker:${{ github.event.inputs.snapcast_version || '0.34.0' }}
